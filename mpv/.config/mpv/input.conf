# mpv keybindings
# https://github.com/mpv-player/mpv/blob/master/etc/input.conf

# Audio
a cycle audio
{ add audio-delay 0.100
} add audio-delay -0.100

# Chapter
PGUP add chapter 1
PGDWN add chapter -1

# Frame
, frame-back-step
. frame-step

# Fullscreen
f cycle fullscreen
ESC set fullscreen no
MBTN_LEFT_DBL cycle fullscreen

# Loop
l cycle-values loop-file "inf" "no"

# Mute
m cycle mute
MUTE cycle mute

# Pause
PLAY cycle pause
PAUSE cycle pause
SPACE cycle pause; show-progress
PLAYONLY set pause no
MBTN_LEFT cycle pause
PAUSEONLY set pause yes
PLAYPAUSE cycle pause

# Playlist
< playlist-prev
> playlist-next
NEXT playlist-next
PREV playlist-prev
MBTN_BACK playlist-prev
MBTN_FORWARD playlist-next
Shift+END no-osd set playlist-pos-1 ${playlist-count}
Shift+HOME no-osd set playlist-pos 0

# Quit
q quit
Q quit-watch-later
STOP quit
POWER quit
CLOSE_WIN quit
Ctrl+c quit 4
Ctrl+w quit

# Screenshot
c screenshot video
C screenshot

# Script: OSC
o script-binding osc/visibility
MOUSE_MOVE script-binding osc/__keybinding3
MOUSE_LEAVE script-binding osc/__keybinding4

# Script: Select
g-c script-binding select/select-chapter
g-p script-binding select/select-playlist
g-t script-binding select/select-track

# Script: Stats
? script-binding stats/display-page-4-toggle
MBTN_RIGHT script-binding stats/display-page-4-toggle

# Seek
HOME seek 0 absolute
LEFT seek -5
RIGHT seek 5
REWIND seek -60
FORWARD seek 60
WHEEL_LEFT seek -1
WHEEL_RIGHT seek 1
Shift+LEFT no-osd seek -1 exact
Shift+PGUP seek 600
Shift+PGDWN seek -600
Shift+RIGHT no-osd seek 1 exact

# Speed
[ multiply speed 1/1.1
] multiply speed 1.1
BS set speed 1.0; no-osd set audio-delay 0; no-osd set sub-delay 0

# Sub
( add sub-delay +0.1
) add sub-delay -0.1
s cycle sub
S cycle sub-visibility
Ctrl+s add sub-scale +0.1
Ctrl+S add sub-scale -0.1

# Video
r cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "no"
v cycle video
ZOOMIN add video-zoom 0.1
ZOOMOUT add video-zoom -0.1
Alt+UP add video-pan-y 0.1
Alt+DOWN add video-pan-y -0.1
Alt+LEFT add video-pan-x 0.1
Alt+RIGHT add video-pan-x -0.1
Ctrl++ add video-zoom 0.1
Ctrl+- add video-zoom -0.1
Ctrl+0 set video-zoom 0; no-osd set panscan 0; no-osd set video-pan-x 0; no-osd set video-pan-y 0; no-osd set video-align-x 0; no-osd set video-align-y 0
Ctrl+= add video-zoom 0.1
Ctrl+KP0 set video-zoom 0; no-osd set panscan 0; no-osd set video-pan-x 0; no-osd set video-pan-y 0; no-osd set video-align-x 0; no-osd set video-align-y 0
Ctrl+KP_ADD add video-zoom 0.1
Ctrl+KP_SUBTRACT add video-zoom -0.1

# Volume
UP add volume 5
DOWN add volume -5
WHEEL_UP add volume 1
VOLUME_DOWN add volume -2
WHEEL_DOWN add volume -1
VOLUME_UP add volume 2
Shift+UP add volume 1
Shift+DOWN add volume -1

# Encode
ESC {encode} quit 4
q {encode} quit 4
CLOSE_WIN {encode} quit 4

