# ------------------------------------------------------------------------------
# VARIABLES
# ------------------------------------------------------------------------------
set $bright_step 1
set $vol_step 1

set $keycode_screenlock 160
# ------------------------------------------------------------------------------
# WINDOW
# ------------------------------------------------------------------------------
# Kill focused window
bindsym $mod+q kill

# Change focus
bindsym $mod+Left fullscreen disable; focus left
bindsym $mod+Down fullscreen disable; focus down
bindsym $mod+Up fullscreen disable; focus up
bindsym $mod+Right fullscreen disable; focus right

# Move focused window
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Enter fullscreen mode for the focused container
bindsym $mod+f fullscreen

# Enter move mode
bindsym $mod+m mode 'move'

# Enter resize mode
bindsym $mod+r mode 'resize'

# Split in horizontal/vertical orientation
bindsym $mod+s split toggle

# Change container layouts (splith/tabbed)
bindsym $mod+l layout splith
bindsym $mod+Shift+l layout tabbed

# Show/hide title bar
bindsym $mod+t border normal
bindsym $mod+Shift+t border pixel

# Toggle the current focus between tiling and floating mode
bindsym $mod+Shift+space floating toggle

# Swap focus between the tiling area and the floating area
bindsym $mod+space focus mode_toggle

# Drag floating windows by holding down $mod and left mouse button.
# Resize them with right mouse button + $mod.
floating_modifier $mod normal

# Reload the configuration file
bindsym $mod+Shift+c reload
# ------------------------------------------------------------------------------
# APPLICATION
# ------------------------------------------------------------------------------
# Brightness
bindsym --locked XF86MonBrightnessUp exec brightnessctl set $bright_step%+
bindsym --locked XF86MonBrightnessDown exec brightnessctl set $bright_step%-

# File explorer
bindsym $mod+e exec foot --title=lf lf -log /tmp/lf.log

# Internet browser
bindsym $mod+i exec firefox

# Launcher
bindsym $mod+d exec 'rofi -modes applications,settings,power -show'

# Notification
bindsym $mod+n exec dunstctl close
bindsym $mod+Shift+n exec dunstctl history-pop

# Screen locker
# bindsym XF86ScreenSaver exec swaylock -f
bindcode $keycode_screenlock exec swaylock -f

# Screenshot
bindsym Print exec screenshot screen
bindsym Shift+Print exec screenshot window
bindsym Ctrl+Print exec screenshot area

# Suspend
# bindsym XF86Sleep exec systemctl suspend

# System update
bindsym $mod+Shift+u exec foot --title=pacman \
  sudo pacman --sync --refresh --sysupgrade

# Terminal
bindsym $mod+Return exec foot

# Text editor
bindsym $mod+Shift+e exec foot --title=nvim nvim

# Volume
# Audio output
bindsym --locked XF86AudioRaiseVolume exec \
  wpctl set-volume @DEFAULT_SINK@ $vol_step%+ -l 1.0
bindsym --locked XF86AudioLowerVolume exec \
  wpctl set-volume @DEFAULT_SINK@ $vol_step%- -l 1.0
bindsym --locked XF86AudioMute exec wpctl set-mute @DEFAULT_SINK@ toggle

# Audio input
bindsym --locked Shift+XF86AudioRaiseVolume exec \
  wpctl set-volume @DEFAULT_SOURCE@ $vol_step%+ -l 1.0
bindsym --locked Shift+XF86AudioLowerVolume exec \
  wpctl set-volume @DEFAULT_SOURCE@ $vol_step%- -l 1.0
bindsym --locked Shift+XF86AudioMute exec wpctl set-mute @DEFAULT_SOURCE@ toggle
# ------------------------------------------------------------------------------
# WORKSPACE
# ------------------------------------------------------------------------------
# Switch to workspace
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6

# Move focused container to workspace
bindsym $mod+Shift+1 move container to workspace number 1; workspace 1
bindsym $mod+Shift+2 move container to workspace number 2; workspace 2
bindsym $mod+Shift+3 move container to workspace number 3; workspace 3
bindsym $mod+Shift+4 move container to workspace number 4; workspace 4
bindsym $mod+Shift+5 move container to workspace number 5; workspace 5
bindsym $mod+Shift+6 move container to workspace number 6; workspace 6

# Switch to the next/previous workspace
bindsym $mod+Tab workspace next
bindsym $mod+Shift+Tab workspace prev

# Switch to the latest urgent workspace
bindsym $mod+u [urgent=latest] focus
