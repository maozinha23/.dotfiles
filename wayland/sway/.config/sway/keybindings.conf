# ------------------------------------------------------------------------------
# VARIABLES
# ------------------------------------------------------------------------------
set $app_launcher "rofi -modi drun,power -show drun"

# Brightness change step
set $brightness 1

set $internet_browser firefox

# Set the Win key as $mod
set $mod Mod4

# Screen capture and notification message
# set $SCREENSHOT_FULL import -window root \
# "$(xdg-user-dir PICTURES)/"\
# "$(date '+%Y-%m-%d_%H-%M-%S')_"\
# "$(uname --nodename)_"\
# "$(whoami).png"
# set $SCREENSHOT_SELECTION import \
# "$(xdg-user-dir PICTURES)/"\
# "$(date '+%Y-%m-%d_%H-%M-%S')_"\
# "$(uname --nodename)_"\
# "$(whoami).png"
# set $SCREENSHOT_NOTIFICATION 'IMAGEMAGIK' 'Screenshot has been taken'

set $terminal foot

set $text_editor nvim

# Volume change step
set $volume 1
# ------------------------------------------------------------------------------
# WINDOW
# ------------------------------------------------------------------------------
# Kill focused window
bindsym $mod+q kill

# Change focus
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move focused window
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Enter fullscreen mode for the focused container
bindsym $mod+f fullscreen

# Enter resize mode
bindsym $mod+r mode "resize"

# Split in horizontal/vertical orientation
bindsym $mod+t split toggle

# Toggle between container layouts (tabbed, splitv)
bindsym $mod+w layout toggle tabbed splith

# Toggle the current focus between tiling and floating mode
bindsym $mod+Shift+space floating toggle

# Swap focus between the tiling area and the floating area
bindsym $mod+space focus mode_toggle

# Drag floating windows by holding down $mod and left mouse button.
# Resize them with right mouse button + $mod.
# Despite the name, also works for non-floating windows.
# Change normal to inverse to use left mouse button for resizing and right
# mouse button for dragging.
floating_modifier $mod normal

# Move tiling windows via drag & drop by left-clicking into the title bar,
# or left-clicking anywhere into the window while holding the floating modifier.
# tiling_drag modifier titlebar

# Reload the configuration file
bindsym $mod+Shift+c reload
# ------------------------------------------------------------------------------
# APPLICATION
# ------------------------------------------------------------------------------
# Brightness
bindsym --locked XF86MonBrightnessUp exec brightnessctl set $brightness%+
bindsym --locked XF86MonBrightnessDown exec brightnessctl set $brightness%-

# Internet browser
bindsym $mod+i exec $internet_browser

# Launcher
bindsym $mod+d exec $app_launcher

# Notification
# bindsym $mod+n exec dunstctl close
# bindsym $mod+Shift+n exec dunstctl history-pop

# Screen locker
# bindsym XF86ScreenSaver exec loginctl lock-session
# bindsym $mod+Shift+l exec loginctl lock-session

# Screenshot
    # bindsym Print exec grim
# bindsym Print exec $SCREENSHOT_FULL \
#   && notify-send $SCREENSHOT_NOTIFICATION
# bindsym Shift+Print exec $SCREENSHOT_SELECTION \
#   && notify-send $SCREENSHOT_NOTIFICATION

# Suspend
# bindsym XF86Sleep exec systemctl suspend

# Terminal
bindsym $mod+Return exec $terminal

# Text editor
bindsym $mod+e exec $terminal $text_editor

# Volume
# Audio output
bindsym --locked XF86AudioRaiseVolume exec \
  wpctl set-sink-volume @DEFAULT_SINK@ +$volume% -l 1.0
bindsym --locked XF86AudioLowerVolume exec \
  wpctl set-sink-volume @DEFAULT_SINK@ -$volume% -l 1.0
bindsym --locked XF86AudioMute exec \
  wpctl set-sink-mute @DEFAULT_SINK@ toggle

# Audio input
bindsym --locked Shift+XF86AudioRaiseVolume exec \
  wpctl set-source-volume @DEFAULT_SOURCE@ +$volume% -l 1.0
bindsym --locked Shift+XF86AudioLowerVolume exec \
  wpctl set-source-volume @DEFAULT_SOURCE@ -$volume% -l 1.0
bindsym --locked Shift+XF86AudioMute exec \
  wpctl set-source-mute @DEFAULT_SOURCE@ toggle
# ------------------------------------------------------------------------------
# WORKSPACE
# ------------------------------------------------------------------------------
# Switch to workspace
bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5

# Move focused container to workspace
bindsym $mod+Shift+1 move container to workspace number $ws1; \
  workspace $ws1
bindsym $mod+Shift+2 move container to workspace number $ws2; \
  workspace $ws2
bindsym $mod+Shift+3 move container to workspace number $ws3; \
  workspace $ws3
bindsym $mod+Shift+4 move container to workspace number $ws4; \
  workspace $ws4
bindsym $mod+Shift+5 move container to workspace number $ws5; \
  workspace $ws5

# Switch to the next/previous workspace
bindsym $mod+Tab workspace next
bindsym $mod+Shift+Tab workspace prev

# Switch to the latest urgent workspace
bindsym $mod+u [urgent=latest] focus
